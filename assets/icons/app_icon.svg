<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="paper-texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#FFF9E7" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
    </filter>
    <filter id="deboss-inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0" />
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feOffset dx="2" dy="2" result="offsetBlur" />
      <feComposite operator="in" in="offsetBlur" in2="SourceAlpha" result="innerShadow" />
      <feMorphology operator="dilate" radius="1" in="SourceAlpha" result="dilated" />
      <feGaussianBlur in="dilated" stdDeviation="2" result="highlightBlur" />
      <feOffset dx="-1" dy="-1" result="highlightOffset" />
      <feComposite operator="out" in="highlightOffset" in2="SourceAlpha" result="highlight" />
      <feMerge>
        <feMergeNode in="innerShadow" />
        <feMergeNode in="highlight" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="#FFF9E7" />
  <rect width="512" height="512" rx="120" fill="#FFF9E7" opacity="0.1" filter="url(#paper-texture)" />
  <g transform="translate(256, 256)" filter="url(#deboss-inner-shadow)">
    <text
      x="0"
      y="0"
      text-anchor="middle"
      dominant-baseline="central"
      fill="#e67e22"
      style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 140px; letter-spacing: -0.05em;"
    >catit</text>
  </g>
</svg>
